<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form 15 - Module mới</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f3f6fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 900px;
      margin: 48px auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 6px 24px rgba(15, 23, 42, 0.06);
    }
    .badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    .btn {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      text-decoration: none;
      color: #111827;
      background: #fff;
    }
    .btn-primary {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="badge">Demo điều hướng</div>
    <h1>Form 15 - Module tách rời</h1>
    <p>Trang này dùng để kiểm tra việc điều hướng từ Cổng tác vụ sang module Form 15 mới.</p>
    <div class="actions">
      <a class="btn btn-primary" href="../index.html">Quay về Cổng tác vụ</a>
    </div>
  </main>
</body>
</html>

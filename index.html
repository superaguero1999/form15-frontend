<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form 15 - Kiểm soát test bền</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --danger: #b91c1c;
      --ok: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(1400px, 96vw);
      margin: 24px auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-soft);
      color: #1d4ed8;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
    }
    p {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 14px;
      text-decoration: none;
      color: #0f172a;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { filter: brightness(0.98); }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
      font-size: 14px;
      color: #334155;
      white-space: pre-wrap;
    }
    .status.ok { border-color: #a7f3d0; background: #ecfdf5; color: var(--ok); }
    .status.err { border-color: #fecaca; background: #fef2f2; color: var(--danger); }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
    }
    .table-wrap {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      max-height: 72vh;
      background: #fff;
    }
    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      font-size: 13px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      border-right: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fafc;
      font-weight: 700;
      white-space: nowrap;
    }
    td small {
      color: var(--muted);
      display: block;
      margin-top: 2px;
    }
    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="badge">Form 15</div>
    <div class="topbar">
      <div>
        <h1>Kiểm soát test bền</h1>
        <p>Quét NocoDB, đọc file Excel và lọc các hạng mục có "Đánh giá = Test bền".</p>
      </div>
      <div class="actions">
        <button id="demo-btn" class="btn" type="button">Demo 1 file</button>
        <button id="refresh-btn" class="btn btn-primary" type="button">Refresh dữ liệu</button>
      </div>
    </div>

    <div id="status-box" class="status">Sẵn sàng quét dữ liệu.</div>
    <div id="meta-box" class="meta"></div>

    <div class="table-wrap">
      <div id="table-root" class="empty">Chưa có dữ liệu. Nhấn "Refresh dữ liệu" để bắt đầu quét.</div>
    </div>
  </main>

  <script src="./assets/js/config/appConfig.js"></script>
  <script src="./assets/js/utils/common.js"></script>
  <script src="./assets/js/services/cacheService.js"></script>
  <script src="./assets/js/services/dataService.js"></script>
  <script src="./assets/js/services/excelService.js"></script>
  <script src="./assets/js/ui/renderService.js"></script>
  <script src="./assets/js/main.js"></script>
</body>
</html>

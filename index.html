<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form 15 - Kiểm soát test bền</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --danger: #b91c1c;
      --ok: #047857;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      width: min(1400px, 96vw);
      margin: 24px auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 28px rgba(15, 23, 42, 0.06);
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .wrap.frame-ok {
      border-color: #86efac;
      box-shadow: 0 8px 28px rgba(22, 163, 74, 0.18);
    }
    .wrap.frame-refreshing {
      border-color: #fca5a5;
      box-shadow: 0 8px 28px rgba(220, 38, 38, 0.2);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .topbar-lead {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      min-width: 0;
    }
    .lab-preview-link-btn {
      border: none;
      background: none;
      padding: 0;
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--blue);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
    }
    .lab-preview-link-btn:hover {
      color: #1d4ed8;
    }
    .lab-preview-link-btn:focus-visible {
      outline: 2px solid #93c5fd;
      outline-offset: 2px;
      border-radius: 4px;
    }
    .lab-preview-link-btn[hidden] {
      display: none !important;
    }
    .lab-preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10020;
      padding: 16px;
    }
    .lab-preview-modal.open {
      display: flex;
    }
    .lab-preview-card {
      width: min(1100px, 98vw);
      max-height: 94vh;
      overflow: auto;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.22);
      padding: 14px 16px;
    }
    .lab-preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .lab-preview-title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
    }
    .lab-preview-close {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .lab-preview-body {
      text-align: center;
      line-height: 0;
    }
    .lab-preview-img {
      max-width: 100%;
      height: auto;
      max-height: min(82vh, 880px);
      object-fit: contain;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      width: 160px;
      height: 30px;
      background: var(--blue-soft);
      color: #1d4ed8;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 20px;
      text-align: center;
      vertical-align: middle;
      font-weight: 600;
      margin-bottom: 10px;
    }
    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
    }
    p {
      margin: 8px 0 0;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      white-space: nowrap;
    }
    .source-badge.source-snapshot {
      border-color: #86efac;
      background: #ecfdf5;
      color: #166534;
    }
    .source-badge.source-fallback {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }
    .source-badge.source-scan {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .ttl-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #334155;
      background: #f8fafc;
      white-space: nowrap;
    }
    .ttl-badge.ttl-fresh {
      border-color: #86efac;
      background: #ecfdf5;
      color: #166534;
    }
    .ttl-badge.ttl-warn {
      border-color: #fde68a;
      background: #fffbeb;
      color: #92400e;
    }
    .ttl-badge.ttl-expired {
      border-color: #fca5a5;
      background: #fef2f2;
      color: #991b1b;
    }
    .btn {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 14px;
      text-decoration: none;
      color: #0f172a;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    .btn:hover { filter: brightness(0.98); }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafc;
      font-size: 14px;
      color: #334155;
      white-space: pre-wrap;
    }
    .status.ok {
      border-color: #a7f3d0;
      background: #ecfdf5;
      color: var(--ok);
      font-weight: 700;
    }
    .status.info {
      border-color: #cbd5e1;
      background: #f1f5f9;
      color: #475569;
      font-weight: 600;
    }
    .status-ok-check {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--ok);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      margin-right: 8px;
      vertical-align: middle;
      line-height: 1;
    }
    .status.err { border-color: #fecaca; background: #fef2f2; color: var(--danger); }
    .status.warn {
      border-color: #fecaca;
      background: #fef2f2;
      color: #dc2626;
      font-weight: 700;
    }
    .status.loading {
      border-color: #fecaca;
      background: #fef2f2;
      color: #dc2626;
      font-weight: 700;
    }
    .status-spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(220, 38, 38, 0.25);
      border-top-color: #dc2626;
      border-radius: 50%;
      animation: statusSpin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    .status-hint {
      display: block;
      margin-top: 4px;
      font-size: 12px;
      font-style: italic;
      font-weight: 400;
      color: #dc2626;
    }
    @keyframes statusSpin {
      to { transform: rotate(360deg); }
    }
    .meta {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .meta-detail-btn {
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 600;
    }
    .meta-detail-btn:hover {
      background: #dbeafe;
    }
    .meta-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    .meta-modal.open {
      display: flex;
    }
    .meta-modal-card {
      width: min(920px, 96vw);
      max-height: 80vh;
      overflow: auto;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 24px 40px rgba(15, 23, 42, 0.2);
      padding: 16px;
    }
    .meta-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .meta-modal-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
    }
    .meta-modal-close {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      border-radius: 8px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .meta-modal-content {
      margin: 0;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.6;
      color: #334155;
    }
    .manual-area-cell {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }
    .manual-area-cell .manual-test-area-input {
      flex: 1;
      min-width: 0;
    }
    .lab-map-open-btn {
      flex-shrink: 0;
      border: 1px solid #93c5fd;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .lab-map-open-btn:hover:not(:disabled) {
      background: #dbeafe;
    }
    .lab-map-open-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .lab-map-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 16px;
    }
    .lab-map-modal.open {
      display: flex;
    }
    .lab-map-card {
      width: min(1200px, 98vw);
      max-height: 92vh;
      overflow: auto;
      border-radius: 12px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: 0 24px 48px rgba(15, 23, 42, 0.25);
      padding: 14px 16px;
    }
    .lab-map-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }
    .lab-map-title {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
    }
    .lab-map-close {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #334155;
      border-radius: 8px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }
    .lab-map-toolbar-compact {
      margin-bottom: 0;
      padding: 0;
      background: transparent;
      border: none;
    }
    /* Nút Manual Set: cuối thẻ modal, căn phải — ít thu hút so với sơ đồ chính */
    .lab-map-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f1f5f9;
    }
    .lab-map-footer .btn.lab-map-manual-set-btn {
      font-size: 10px;
      font-style: italic;
      font-weight: 400;
      text-decoration: underline;
      text-underline-offset: 2px;
      padding: 2px 4px;
      margin: 0;
      border: none;
      border-radius: 4px;
      background: transparent;
      color: #94a3b8;
      opacity: 0.72;
      cursor: pointer;
      box-shadow: none;
      line-height: 1.3;
      letter-spacing: 0.01em;
    }
    .lab-map-footer .btn.lab-map-manual-set-btn:hover {
      opacity: 0.95;
      color: #64748b;
      background: rgba(148, 163, 184, 0.12);
    }
    .lab-map-footer .btn.lab-map-manual-set-btn:focus-visible {
      outline: 1px solid #cbd5e1;
      outline-offset: 2px;
    }
    .lab-map-manual-panel {
      margin-bottom: 12px;
    }
    .lab-map-manual-panel-card {
      padding: 12px 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      font-size: 12px;
      color: #334155;
      line-height: 1.45;
    }
    .lab-map-manual-lead {
      margin: 0 0 10px;
    }
    .lab-map-manual-lock-block {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e2e8f0;
    }
    .lab-map-manual-pw-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
    }
    .lab-map-manual-pw-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .lab-map-manual-pw {
      min-width: 180px;
      padding: 6px 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 13px;
    }
    .lab-map-manual-pw-err {
      margin: 8px 0 0;
      font-size: 12px;
      color: #b91c1c;
      font-weight: 600;
    }
    .lab-map-manual-controls-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 10px;
    }
    .lab-map-manual-controls .btn {
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      background: #fff;
      cursor: pointer;
      font-weight: 600;
      color: #1e293b;
    }
    .lab-map-manual-controls .btn:hover:not(:disabled) {
      background: #f1f5f9;
    }
    .lab-map-manual-controls .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .lab-map-manual-guide {
      margin-top: 4px;
    }
    .lab-map-manual-guide-sum {
      cursor: pointer;
      font-weight: 700;
      color: #0f172a;
    }
    .lab-map-manual-guide-list {
      margin: 8px 0 0;
      padding-left: 1.25rem;
    }
    .lab-map-manual-guide-list li {
      margin-bottom: 6px;
    }
    .lab-map-manual-guide-list code {
      font-size: 11px;
      background: #e2e8f0;
      padding: 1px 5px;
      border-radius: 4px;
    }
    .lab-map-edit-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      font-weight: 600;
    }
    /* Stage chỉ khung; inner ôm đúng kích thước ảnh — overlay % trùng pixel ảnh */
    .lab-map-stage {
      display: inline-block;
      max-width: 100%;
      vertical-align: top;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      line-height: 0;
    }
    .lab-map-inner {
      position: relative;
      display: inline-block;
      max-width: 100%;
      line-height: 0;
      vertical-align: top;
    }
    .lab-map-inner img {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      object-fit: contain;
      vertical-align: top;
    }
    /* Vùng % (zones) tính trên map-area; dùng contentInset khi PNG có viền trắng */
    .lab-map-map-area {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      pointer-events: none;
    }
    .lab-map-zones {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      pointer-events: none;
    }
    .lab-map-zone-wrap {
      position: absolute;
      box-sizing: border-box;
      pointer-events: auto;
    }
    .lab-map-zone {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      pointer-events: auto;
      box-sizing: border-box;
      background: rgba(37, 99, 235, 0.14);
      /* Viền đỏ: độ dày +10% so với 3px; “bóng” khung: vòng ngoài + highlight nhẹ */
      border: 3.3px solid #b91c1c;
      border-radius: 6px;
      box-shadow:
        0 0 0 1px rgba(185, 28, 28, 0.44),
        0 2px 5px rgba(185, 28, 28, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.22);
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      color: #b91c1c;
      padding: 2px;
      line-height: 1.15;
      text-align: center;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }
    .lab-map-modal.lab-map-edit .lab-map-zone-wrap {
      user-select: none;
    }
    .lab-map-modal.lab-map-edit .lab-map-zone {
      cursor: move;
    }
    .lab-map-zone-handle {
      display: none;
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 14px;
      height: 14px;
      box-sizing: border-box;
      background: #1d4ed8;
      border: 2px solid #fff;
      border-radius: 3px;
      cursor: nwse-resize;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.35);
      z-index: 2;
    }
    .lab-map-modal.lab-map-edit .lab-map-zone-handle {
      display: block;
    }
    .lab-map-zone:hover {
      background: rgba(37, 99, 235, 0.28);
      border-color: #991b1b;
      color: #991b1b;
      box-shadow:
        0 0 0 1.1px rgba(153, 27, 27, 0.48),
        0 2px 6px rgba(153, 27, 27, 0.33),
        inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }
    .lab-map-hint {
      margin: 0 0 10px;
      font-size: 12px;
      color: #64748b;
    }
    .table-wrap {
      margin-top: 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: auto;
      max-height: 72vh;
      background: #fff;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1200px;
      table-layout: fixed;
      font-size: 13px;
    }
    th, td {
      border: 1px solid #94a3b8;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      color: #0f172a;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      /* Cùng tông slate xám-xanh, đậm hơn #f8fafc để hàng tiêu đề rõ hơn */
      background: #e2e8f0;
      font-weight: 700;
    }
    .col-fixed {
      width: 140px;
      max-width: 140px;
    }
    /* Tên tác vụ: 280px / 1.2 ≈ 233px */
    .col-task-name {
      width: 233px;
      max-width: 233px;
    }
    /* Mã tác vụ, Sheet: ~140px / 1.2 */
    th.col-task-code,
    td.col-task-code,
    th.col-sheet,
    td.col-sheet {
      width: 117px;
      max-width: 117px;
    }
    /* Link file: ~140px / 1.8 */
    th.col-link-file,
    td.col-link-file {
      width: 78px;
      max-width: 78px;
    }
    td.col-link-file a {
      font-size: 11px;
      word-break: break-all;
    }
    /* STT: 42px × 1.2 ≈ 50px */
    .col-stt {
      width: 50px;
      min-width: 50px;
      max-width: 50px;
    }
    .col-standard-work {
      width: 70px;
      max-width: 70px;
    }
    .col-category-code {
      width: 93px;
      max-width: 93px;
    }
    .col-guide-doc {
      width: 280px;
      max-width: 280px;
    }
    .col-save-data {
      text-align: center;
    }
    /* Kết quả: ~1/2 độ rộng cột col-fixed (140px → 70px) */
    th.col-ket-qua,
    td.col-ket-qua {
      width: 70px;
      max-width: 70px;
    }
    td.col-ket-qua .manual-textarea {
      min-width: 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    /* Ghi chú: ~191px / 1.1 ≈ 174px */
    th.col-ghi-chu,
    td.col-ghi-chu {
      width: 174px;
      max-width: 174px;
    }
    /* Chi tiết vị trí test: ~140px / 1.1 ≈ 127px */
    th.col-chi-tiet-vi-tri,
    td.col-chi-tiet-vi-tri {
      width: 127px;
      max-width: 127px;
    }
    td.col-ghi-chu .manual-textarea,
    td.col-chi-tiet-vi-tri .manual-textarea {
      min-width: 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    /* Trạng thái: ~140px / 1.3 ≈ 108px */
    th.col-manual-status,
    td.col-manual-status {
      width: 108px;
      max-width: 108px;
    }
    /* .manual-input có min-width:120px — ghi đè để select khớp cột hẹp */
    td.col-manual-status .manual-status-select.manual-input {
      min-width: 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    /* Thời gian (date): ~117px × 1.1 ≈ 129px */
    th.col-manual-date,
    td.col-manual-date {
      width: 129px;
      max-width: 129px;
    }
    td.col-manual-date .manual-input {
      min-width: 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    /* Số lượng mẫu: ~100px / 1.2 ≈ 83px */
    th.col-so-luong-mau,
    td.col-so-luong-mau {
      width: 83px;
      max-width: 83px;
    }
    td.col-so-luong-mau .manual-input {
      min-width: 0;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
    }
    /* Lưu dữ liệu: ~140px / 1.5 ≈ 93px */
    th.col-save-data.col-manual,
    td.col-save-data.col-manual {
      width: 93px;
      max-width: 93px;
    }
    td.col-save-data .manual-save-btn {
      padding: 5px 8px;
      font-size: 11px;
    }
    td.col-manual {
      background: #eff6ff;
    }
    th.col-manual {
      background: #bfdbfe;
    }
    /* Hàng đang chọn (click) — nổi bật để tránh nhập nhầm */
    #table-root tbody tr.row-selected td {
      background: #dbeafe !important;
      font-weight: 600;
      color: #0f172a;
      border-color: #60a5fa;
      box-shadow: inset 4px 0 0 #2563eb;
    }
    #table-root tbody tr.row-selected td.col-manual {
      background: #bfdbfe !important;
    }
    #table-root tbody tr.row-selected td a {
      font-weight: 700;
    }
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .filter-label {
      font-size: 13px;
      color: #334155;
      font-weight: 600;
    }
    .filter-select,
    .filter-input {
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      background: #fff;
      color: #0f172a;
    }
    .filter-input {
      min-width: 240px;
    }
    .filter-date-range {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-date-range[hidden] {
      display: none !important;
    }
    .filter-input-date {
      min-width: 150px;
    }
    .filter-sublabel {
      font-size: 12px;
      color: #475569;
      font-weight: 600;
    }
    .filter-count {
      font-size: 12px;
      color: #64748b;
    }
    /* Phải cao hon .lab-map-modal (10000) va moi lop khac — neu bang nhau, phan tu sau trong DOM se che nut */
    .refresh-lock-modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999999;
      padding: 20px;
      pointer-events: auto;
    }
    .refresh-lock-modal.open {
      display: flex;
    }
    .refresh-lock-card {
      position: relative;
      z-index: 1;
      pointer-events: auto;
      width: min(460px, 96vw);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 24px 40px rgba(15, 23, 42, 0.25);
      text-align: center;
    }
    .refresh-lock-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 700;
      color: #dc2626;
    }
    .refresh-lock-msg {
      margin: 0 0 16px;
      color: #334155;
      font-size: 14px;
      line-height: 1.5;
    }
    .refresh-lock-actions {
      display: flex;
      justify-content: center;
      gap: 8px;
    }
    .refresh-lock-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .col-dynamic {
      width: 120px;
      max-width: 120px;
    }
    td small {
      color: #0f172a;
      display: block;
      margin-top: 2px;
    }
    .empty {
      padding: 22px;
      color: var(--muted);
      text-align: center;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }
    .manual-input {
      width: 100%;
      min-width: 120px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 6px;
      font-size: 12px;
      background: #fff;
      color: #0f172a;
    }
    .manual-textarea {
      min-height: 4.5em;
      max-height: 14em;
      resize: vertical;
      line-height: 1.35;
      white-space: pre-wrap;
      field-sizing: content;
    }
    .manual-status-select.status-pending {
      background: #e2e8f0;
      color: #475569;
      font-weight: 600;
    }
    .manual-status-select.status-doing {
      background: #dbeafe;
      color: #1e40af;
      font-weight: 700;
    }
    .manual-status-select.status-done {
      background: #bbf7d0;
      color: #14532d;
      font-weight: 700;
    }
    .manual-status-select.status-cancel {
      background: #fecaca;
      color: #991b1b;
      font-weight: 700;
    }
    th.col-save-data.col-manual {
      background: #93c5fd;
    }
    td.col-save-data.col-manual {
      background: #e0ecff;
      border: 1.5px solid #60a5fa;
    }
    .manual-save-btn {
      border: 1.5px solid #1d4ed8;
      background: #2563eb;
      color: #ffffff;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 1px 3px rgba(29, 78, 216, 0.35);
      transition: background-color 0.15s ease, box-shadow 0.15s ease;
    }
    .manual-save-btn:hover {
      background: #1d4ed8;
      box-shadow: 0 2px 5px rgba(29, 78, 216, 0.45);
    }
    .manual-save-btn:active {
      background: #1e40af;
      box-shadow: 0 1px 2px rgba(29, 78, 216, 0.5) inset;
    }
    .manual-save-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }
    .manual-save-state {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: #0f172a;
      text-align: center;
      font-weight: 600;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="wrap">
    <div class="badge">Durability Test</div>
    <div class="topbar">
      <div class="topbar-lead">
        <h1>Bảng theo dõi hiện trạng Test bền</h1>
        <button type="button" id="lab-preview-btn" class="lab-preview-link-btn" hidden>Xem sơ đồ khu vực test</button>
      </div>
      <div class="actions">
        <button id="refresh-btn" class="btn btn-primary" type="button">Refresh dữ liệu</button>
      </div>
    </div>

    <div id="status-box" class="status warn">Tải lại trang để cập nhật dữ liệu mới nhất</div>
    <div id="meta-box" class="meta"></div>

    <div class="filter-bar">
      <label class="filter-label" for="filter-field">Lọc theo:</label>
      <select id="filter-field" class="filter-select">
        <option value="">-- Chọn trường --</option>
      </select>
      <input id="filter-value" class="filter-input" type="text" placeholder="Nhập giá trị cần tìm..." />
      <div id="filter-date-range" class="filter-date-range" hidden>
        <span class="filter-sublabel">Từ</span>
        <input id="filter-date-from" class="filter-input filter-input-date" type="date" />
        <span class="filter-sublabel">Đến</span>
        <input id="filter-date-to" class="filter-input filter-input-date" type="date" />
      </div>

      <span class="filter-sublabel">và</span>
      <select id="filter-field-2" class="filter-select">
        <option value="">-- Chọn trường --</option>
      </select>
      <input id="filter-value-2" class="filter-input" type="text" placeholder="Nhập giá trị cần tìm..." />
      <div id="filter-date-range-2" class="filter-date-range" hidden>
        <span class="filter-sublabel">Từ</span>
        <input id="filter-date-from-2" class="filter-input filter-input-date" type="date" />
        <span class="filter-sublabel">Đến</span>
        <input id="filter-date-to-2" class="filter-input filter-input-date" type="date" />
      </div>

      <button id="filter-clear" class="btn" type="button">Xóa lọc</button>
      <button id="export-excel-btn" class="btn" type="button">Xuất Excel</button>
      <span id="filter-count" class="filter-count"></span>
    </div>

    <div class="table-wrap">
      <div id="table-root" class="empty">Chưa có dữ liệu. Nhấn "Refresh dữ liệu" để bắt đầu quét.</div>
    </div>
  </main>

  <script src="./assets/js/config/appConfig.js"></script>
  <script src="./assets/js/utils/common.js"></script>
  <script src="./assets/js/services/cacheService.js"></script>
  <script src="./assets/js/services/dataService.js"></script>
  <script src="./assets/js/services/excelService.js"></script>
  <script src="./assets/js/services/syncService.js"></script>
  <script src="./assets/js/services/manualService.js"></script>
  <script src="./assets/js/ui/renderService.js"></script>
  <script src="./assets/js/main.js"></script>
</body>
</html>
